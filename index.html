// ─── STORAGE ─────────────────────────────────────────────────────────────────
const STORAGE_KEY = "timeline_app_v1";

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function saveData(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    showToast();
  } catch {}
}

function showToast() {
  const el = document.getElementById("toast");
  if (!el) return;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 1800);
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function toMin(t){const[h,m]=t.split(":").map(Number);return h*60+m;}
function toTime(m){return`${String(Math.floor(m/60)%24).padStart(2,"0")}:${String(m%60).padStart(2,"0")}`;}
function nowMin(){const n=new Date();return n.getHours()*60+n.getMinutes();}
function fmtDur(m){return m<60?`${m}分`:(m%60===0?`${m/60}時間`:`${Math.floor(m/60)}時間${m%60}分`);}

function assignColumns(tasks){
  const sorted=[...tasks].sort((a,b)=>toMin(a.time)-toMin(b.time));
  const result=sorted.map(t=>({...t,col:0,totalCols:1}));
  for(let i=0;i<result.length;i++){
    const a=result[i];const aEnd=toMin(a.time)+a.duration;
    const ov=[a];
    for(let j=i+1;j<result.length;j++){if(toMin(result[j].time)<aEnd)ov.push(result[j]);}
    if(ov.length>1)ov.forEach((t,idx)=>{t.col=idx;t.totalCols=ov.length;});
  }
  return result;
}

const WEEKDAY_LABELS=["日","月","火","水","木","金","土"];

function repeatLabel(r){
  if(!r||r.type==="none")return null;
  if(r.type==="daily")return r.interval===1?"毎日":`${r.interval}日おき`;
  if(r.type==="weekday")return"平日";
  if(r.type==="weekly"){const d=r.days?.length?r.days.map(x=>WEEKDAY_LABELS[x]).join(""):"";return r.interval===1?`毎週${d}`:`${r.interval}週おき${d}`;}
  if(r.type==="monthly")return r.interval===1?"毎月":`${r.interval}ヶ月ごと`;
  if(r.type==="yearly")return r.interval===1?"毎年":`${r.interval}年おき`;
  return"繰り返し";
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App(){
  const saved = loadData();
  const [tab,setTab]=useState("timeline");
  const [tasks,setTasks]=useState(saved?.tasks||DEFAULT_TASKS);
  const [later,setLater]=useState(saved?.later||DEFAULT_LATER);
  const [categories,setCategories]=useState(saved?.categories||DEFAULT_CATEGORIES);
  const [wakeTime,setWakeTime]=useState(saved?.settings?.wakeTime||"07:00");
  const [sleepTime,setSleepTime]=useState(saved?.settings?.sleepTime||"23:00");
  const [freeThreshold,setFreeThreshold]=useState(saved?.settings?.freeThreshold||20);
  const [themeId,setThemeId]=useState(saved?.settings?.themeId||"craft");
  const [now,setNow]=useState(nowMin());
  const [modal,setModal]=useState(null);

  C = THEMES.find(t=>t.id===themeId)||THEMES[0];

  // Auto-save whenever data changes
  useEffect(()=>{
    saveData({tasks,later,categories,settings:{wakeTime,sleepTime,freeThreshold,themeId}});
  },[tasks,later,categories,wakeTime,sleepTime,freeThreshold,themeId]);

  useEffect(()=>{
    const iv=setInterval(()=>setNow(nowMin()),30000);
    return()=>clearInterval(iv);
  },[]);

  // Apply background color to body
  useEffect(()=>{ document.body.style.background=C.bg; },[themeId]);

  const getCat=(id)=>categories.find(c=>c.id===id)||{name:"その他",color:"#94a3b8",bg:"#94a3b822"};
  const doneCount=tasks.filter(t=>t.done).length;
  const pinnedTasks=tasks.filter(t=>t.pinned);
  const pinnedLater=later.filter(t=>t.pinned);

  return(
    <div style={{background:C.bg,minHeight:"100vh",maxWidth:430,margin:"0 auto",color:C.text,fontFamily:"-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif",paddingBottom:90}}>
      <Header tab={tab} doneCount={doneCount} totalCount={tasks.length} pinnedTasks={pinnedTasks} pinnedLater={pinnedLater} getCat={getCat} setTab={setTab}/>

      {tab==="timeline"&&<TimelineView tasks={tasks} now={now} wakeTime={wakeTime} sleepTime={sleepTime} freeThreshold={freeThreshold} getCat={getCat} setTasks={setTasks} onEdit={t=>setModal({type:"task",data:t})}/>}
      {tab==="later"&&<LaterView items={later} setLater={setLater} getCat={getCat} onPromote={item=>{setTasks(p=>[...p,{id:Date.now(),title:item.title,time:toTime(now+30),duration:30,categoryId:item.categoryId,done:false,pinned:false,repeat:{type:"none",interval:1,end:{type:"none"}},note:""}]);setLater(p=>p.filter(x=>x.id!==item.id));}} onEdit={item=>setModal({type:"later",data:item})}/>}
      {tab==="stats"&&<StatsView tasks={tasks} categories={categories} getCat={getCat}/>}
      {tab==="settings"&&<SettingsView wakeTime={wakeTime} setWakeTime={setWakeTime} sleepTime={sleepTime} setSleepTime={setSleepTime} freeThreshold={freeThreshold} setFreeThreshold={setFreeThreshold} categories={categories} setCategories={setCategories} themeId={themeId} setThemeId={setThemeId} onEditCat={c=>setModal({type:"category",data:c})} onAddCat={()=>setModal({type:"category",data:null})}/>}

      {(tab==="timeline"||tab==="later")&&(
        <button onClick={()=>setModal({type:tab==="timeline"?"task":"later",data:null})} style={{position:"fixed",bottom:90,right:20,width:52,height:52,borderRadius:"50%",background:`linear-gradient(135deg,${C.accent},${C.accent}bb)`,border:"none",color:"#fff",boxShadow:`0 4px 20px ${C.accentGlow}`,cursor:"pointer",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <Icon name="plus" size={22} color="#fff"/>
        </button>
      )}

      <BottomNav tab={tab} setTab={setTab}/>

      {modal?.type==="task"&&<TaskModal initial={modal.data} categories={categories} onClose={()=>setModal(null)} onSave={t=>{if(t.id)setTasks(p=>p.map(x=>x.id===t.id?t:x));else setTasks(p=>[...p,{...t,id:Date.now()}]);setModal(null);}}/>}
      {modal?.type==="later"&&<LaterModal initial={modal.data} categories={categories} onClose={()=>setModal(null)} onSave={item=>{if(item.id)setLater(p=>p.map(x=>x.id===item.id?item:x));else setLater(p=>[...p,{...item,id:Date.now()}]);setModal(null);}}/>}
      {modal?.type==="category"&&<CategoryModal initial={modal.data} onClose={()=>setModal(null)} onSave={cat=>{if(cat.id&&categories.find(c=>c.id===cat.id))setCategories(p=>p.map(c=>c.id===cat.id?cat:c));else setCategories(p=>[...p,{...cat,id:Date.now().toString()}]);setModal(null);}} onDelete={id=>{setCategories(p=>p.filter(c=>c.id!==id));setModal(null);}}/>}
    </div>
  );
}

function Header({tab,doneCount,totalCount,pinnedTasks,pinnedLater,getCat,setTab}){
  const titles={timeline:"今日",later:"あとでやる",stats:"統計",settings:"設定"};
  return(
    <div style={{padding:"20px 16px 0",position:"sticky",top:0,zIndex:50,background:C.bg,borderBottom:`1px solid ${C.border}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:12}}>
        <div>
          <div style={{fontSize:11,color:C.textSub,letterSpacing:2,fontWeight:600}}>{new Date().toLocaleDateString("ja-JP",{month:"long",day:"numeric",weekday:"short"})}</div>
          <div style={{fontSize:24,fontWeight:800,letterSpacing:-0.5,marginTop:2}}>{titles[tab]}</div>
        </div>
        {tab==="timeline"&&<div style={{background:C.accentDim,border:`1px solid ${C.accentGlow}`,borderRadius:20,padding:"5px 14px",fontSize:13,color:C.accent,fontWeight:700}}>{doneCount}/{totalCount}</div>}
      </div>
      {[...pinnedTasks,...pinnedLater].length>0&&(
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:10}}>
          {pinnedTasks.map(t=>(
            <div key={t.id} onClick={()=>setTab("timeline")} style={{flexShrink:0,display:"flex",alignItems:"center",gap:5,background:t.done?C.greenDim:C.accentDim,border:`1px solid ${t.done?C.green+"44":C.accentGlow}`,borderRadius:10,padding:"4px 10px",fontSize:11,color:t.done?C.green:C.accent,cursor:"pointer",fontWeight:600}}>
              <Icon name="pinFill" size={10} color={t.done?C.green:C.accent}/>{t.time} {t.title}
            </div>

// ─── TIMELINE ────────────────────────────────────────────────────────────────
function TimelineView({tasks,now,wakeTime,sleepTime,freeThreshold,getCat,setTasks,onEdit}){
  const wakeMin=toMin(wakeTime),sleepMin=toMin(sleepTime);
  const pct=Math.max(0,Math.min(100,((now-wakeMin)/(sleepMin-wakeMin))*100));
  const nowRef=useRef(null);
  useEffect(()=>{setTimeout(()=>nowRef.current?.scrollIntoView({behavior:"smooth",block:"center"}),200);},[]);

  const sorted=[...tasks].sort((a,b)=>toMin(a.time)-toMin(b.time));
  const withCols=assignColumns(sorted);
  const items=[];
  let cursor=wakeMin,i=0;
  while(i<withCols.length){
    const t=withCols[i],tMin=toMin(t.time);
    if(tMin-cursor>=freeThreshold)items.push({type:"free",start:cursor,end:tMin});
    const group=[t];let maxEnd=tMin+t.duration,j=i+1;
    while(j<withCols.length&&toMin(withCols[j].time)<maxEnd){group.push(withCols[j]);maxEnd=Math.max(maxEnd,toMin(withCols[j].time)+withCols[j].duration);j++;}
    items.push({type:"group",tasks:group,start:tMin,end:maxEnd});
    cursor=maxEnd;i=j;
  }
  if(sleepMin-cursor>=freeThreshold)items.push({type:"free",start:cursor,end:sleepMin});

  return(
    <div style={{padding:"0 0 20px"}}>
      <div style={{padding:"12px 16px 8px"}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.textSub,marginBottom:5}}>
          <span style={{display:"flex",alignItems:"center",gap:4}}><Icon name="sun" size={13} color={C.amber}/> {wakeTime}</span>
          <span style={{color:C.accent,fontWeight:700,fontSize:12}}>{toTime(now)}</span>
          <span style={{display:"flex",alignItems:"center",gap:4}}>{sleepTime} <Icon name="moon" size={13} color={C.textSub}/></span>
        </div>
        <div style={{background:C.surface,borderRadius:8,height:5,overflow:"hidden"}}>
          <div style={{width:`${pct}%`,height:"100%",borderRadius:8,background:`linear-gradient(90deg,${C.accent},${C.accent}bb)`,transition:"width 1s"}}/>
        </div>
      </div>
      <div style={{padding:"0 16px"}}>
        {items.map((item,idx)=>{
          if(item.type==="free"){
            const isCurrent=now>=item.start&&now<item.end;
            return(<div key={idx} style={{marginBottom:8}}>{isCurrent&&<div ref={nowRef}/>}<FreeSlot start={item.start} end={item.end} isCurrent={isCurrent} now={now}/></div>);
          }
          const isNowG=now>=item.start&&now<item.end;
          return(
            <div key={idx} style={{marginBottom:8}}>
              {isNowG&&<div ref={nowRef}/>}
              <div style={{fontSize:11,color:C.textSub,marginBottom:4,paddingLeft:2,display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontWeight:700,color:isNowG?C.accent:C.textSub}}>{toTime(item.start)}</span>
                {isNowG&&<span style={{width:7,height:7,borderRadius:"50%",background:C.accent,display:"inline-block",boxShadow:`0 0 6px ${C.accent}`}}/>}
              </div>
              <div style={{display:"flex",gap:6}}>
                {item.tasks.map(task=>(
                  <TaskCard key={task.id} task={task} isOverlapped={item.tasks.length>1}
                    isActive={now>=toMin(task.time)&&now<toMin(task.time)+task.duration}
                    isPast={toMin(task.time)+task.duration<now} getCat={getCat}
                    onToggleDone={()=>setTasks(p=>p.map(t=>t.id===task.id?{...t,done:!t.done}:t))}
                    onTogglePin={()=>setTasks(p=>p.map(t=>t.id===task.id?{...t,pinned:!t.pinned}:t))}
                    onDelete={()=>setTasks(p=>p.filter(t=>t.id!==task.id))}
                    onEdit={()=>onEdit(task)}/>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function FreeSlot({start,end,isCurrent,now}){
  const dur=end-start,elapsed=isCurrent?now-start:0;
  const pct=isCurrent?Math.min(100,(elapsed/dur)*100):0;
  return(
    <div style={{border:`1px dashed ${isCurrent?C.accent+"60":C.borderStrong}`,borderRadius:14,padding:"10px 14px",background:isCurrent?C.accentDim:"transparent",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div>
        <div style={{fontSize:11,color:isCurrent?C.accent:C.textSub,fontWeight:600}}>空き時間</div>
        <div style={{fontSize:20,fontWeight:800,color:isCurrent?C.accent:C.textSub,letterSpacing:-0.5}}>{fmtDur(dur)}</div>
        <div style={{fontSize:11,color:C.textSub}}>{toTime(start)} 〜 {toTime(end)}</div>
      </div>
      {isCurrent&&(
        <div style={{width:40,height:40,borderRadius:"50%",border:`3px solid ${C.accentGlow}`,position:"relative",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{fontSize:10,color:C.accent,fontWeight:700}}>{Math.round(pct)}%</div>
          <svg style={{position:"absolute",inset:"-3px",width:46,height:46}} viewBox="0 0 46 46">
            <circle cx="23" cy="23" r="20" fill="none" stroke={C.accent} strokeWidth="3" strokeDasharray={`${pct/100*125.7} 125.7`} strokeLinecap="round" transform="rotate(-90 23 23)" opacity="0.8"/>
          </svg>
        </div>
      )}
    </div>
  );
}

function StatsView({tasks,categories}){
  const done=tasks.filter(t=>t.done).length,total=tasks.length;
  const rate=total>0?Math.round(done/total*100):0;
  const buckets=Array.from({length:18},(_,i)=>({h:i+6,n:tasks.filter(t=>parseInt(t.time.split(":")[0])===i+6&&t.done).length}));
  const maxB=Math.max(...buckets.map(b=>b.n),1);
  return(
    <div style={{padding:16}}>
      <div style={{background:C.surface,borderRadius:18,padding:"16px 18px",marginBottom:12}}>
        <div style={{textAlign:"center",padding:"8px 0 16px"}}>

          <div style={{color:C.textSub,fontSize:13}}>今日の完了率 ({done}/{total})</div>
          <div style={{marginTop:14,background:C.border,borderRadius:8,height:8,overflow:"hidden"}}>
            <div style={{width:`${rate}%`,height:"100%",borderRadius:8,background:`linear-gradient(90deg,${C.accent},${C.accent}bb)`,transition:"width 1s"}}/>
          </div>
        </div>
      </div>
      <div style={{background:C.surface,borderRadius:18,padding:"16px 18px",marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>カテゴリ別</div>
        {categories.map(cat=>{
          const ct=tasks.filter(t=>t.categoryId===cat.id);if(!ct.length)return null;
          const cd=ct.filter(t=>t.done).length;
          return(<div key={cat.id} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}><span style={{color:cat.color,fontWeight:600}}>{cat.name}</span><span style={{color:C.textSub}}>{cd}/{ct.length}</span></div><div style={{background:C.border,borderRadius:6,height:6,overflow:"hidden"}}><div style={{width:`${ct.length?cd/ct.length*100:0}%`,height:"100%",background:cat.color,borderRadius:6}}/></div></div>);
        })}
      </div>
      <div style={{background:C.surface,borderRadius:18,padding:"16px 18px"}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>時間帯別完了数</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:3,height:56}}>
          {buckets.map(b=>(
            <div key={b.h} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <div style={{width:"100%",borderRadius:3,minHeight:b.n?4:0,height:`${b.n/maxB*48}px`,background:b.n?C.accent:C.textFaint}}/>
              {b.h%3===0&&<div style={{fontSize:8,color:C.textFaint}}>{b.h}</div>}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

  return(
    <BottomSheet title={initial?"タスクを編集":"タスクを追加"} onClose={onClose}>
      <Field label="タイトル"><input value={f.title} onChange={e=>set("title",e.target.value)} placeholder="何をしますか？" style={inputSt()} autoFocus/></Field>
      <div style={{display:"flex",gap:10}}>
        <Field label="開始時刻" style={{flex:1}}><input type="time" value={f.time} onChange={e=>set("time",e.target.value)} style={inputSt()}/></Field>
        <Field label="所要時間(分)" style={{flex:1}}><input type="number" value={f.duration} min={5} max={480} step={5} onChange={e=>set("duration",Number(e.target.value))} style={inputSt()}/></Field>
      </div>
      <Field label="カテゴリ"><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{categories.map(cat=><Pill key={cat.id} label={cat.name} active={f.categoryId===cat.id} color={cat.color} bg={cat.bg} onClick={()=>set("categoryId",cat.id)}/>)}</div></Field>
      <Field label="繰り返し">
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
          {[{v:"none",l:"なし"},{v:"daily",l:"毎日"},{v:"weekday",l:"平日"},{v:"weekly",l:"毎週"},{v:"monthly",l:"毎月"},{v:"yearly",l:"毎年"}].map(o=><Pill key={o.v} label={o.l} active={f.repeat.type===o.v} color={C.accent} bg={C.accentDim} onClick={()=>setR("type",o.v)}/>)}
        </div>
        {f.repeat.type!=="none"&&(
          <>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <span style={{fontSize:11,color:C.textSub,minWidth:40}}>間隔</span>
              <input type="range" min={1} max={30} value={f.repeat.interval} onChange={e=>setR("interval",Number(e.target.value))} style={{flex:1,accentColor:C.accent}}/>
              <span style={{color:C.accent,fontWeight:700,minWidth:30}}>{f.repeat.interval}</span>
            </div>
            {f.repeat.type==="weekly"&&(
              <div style={{display:"flex",gap:6,marginBottom:8}}>
                {WEEKDAY_LABELS.map((d,i)=>{const sel=(f.repeat.days||[]).includes(i);return<button key={i} onClick={()=>setR("days",sel?f.repeat.days.filter(x=>x!==i):[...(f.repeat.days||[]),i])} style={{width:34,height:34,borderRadius:"50%",border:`1px solid ${sel?C.accent:C.border}`,background:sel?C.accentDim:"transparent",color:sel?C.accent:C.textSub,fontSize:12,fontWeight:700,cursor:"pointer"}}>{d}</button>;})}
              </div>
            )}
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
              {[{v:"none",l:"終了なし"},{v:"until",l:"日付指定"},{v:"count",l:"回数指定"}].map(o=><Pill key={o.v} label={o.l} active={f.repeat.end?.type===o.v} color={C.accent} bg={C.accentDim} onClick={()=>setRE("type",o.v)}/>)}
            </div>
            {f.repeat.end?.type==="until"&&<input type="date" value={f.repeat.end.until||""} onChange={e=>setRE("until",e.target.value)} style={inputSt()}/>}
            {f.repeat.end?.type==="count"&&<div style={{display:"flex",alignItems:"center",gap:10}}><input type="number" min={1} max={100} value={f.repeat.end.count||1} onChange={e=>setRE("count",Number(e.target.value))} style={{...inputSt(),width:80}}/><span style={{color:C.textSub,fontSize:13}}>回まで</span></div>}
          </>
        )}
      </Field>
      <Field label="メモ（任意）"><input value={f.note} onChange={e=>set("note",e.target.value)} placeholder="補足など" style={inputSt()}/></Field>
      <div style={{marginBottom:16}}>
        <button onClick={()=>set("pinned",!f.pinned)} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 14px",borderRadius:10,fontSize:12,fontWeight:700,background:f.pinned?C.pinkDim:C.surface2,border:`1px solid ${f.pinned?C.pink:C.border}`,color:f.pinned?C.pink:C.textSub,cursor:"pointer"}}>
          <Icon name={f.pinned?"pinFill":"pin"} size={13} color={f.pinned?C.pink:C.textSub}/>{f.pinned?"ピン留め中":"ピン留めする"}
        </button>
      </div>
      <button onClick={()=>{if(f.title.trim())onSave(f);}} style={{width:"100%",padding:14,borderRadius:14,fontSize:15,fontWeight:700,background:`linear-gradient(135deg,${C.accent},${C.accent}bb)`,border:"none",color:"#fff",cursor:"pointer"}}>{initial?"更新する":"追加する"}</button>
    </BottomSheet>
  );
}

function LaterModal({initial,categories,onClose,onSave}){
  const [title,setTitle]=useState(initial?.title||"");
  const [catId,setCatId]=useState(initial?.categoryId||categories[0]?.id||"other");
  const [pinned,setPinned]=useState(initial?.pinned||false);
  return(
    <BottomSheet title={initial?"あとでやるを編集":"あとでやるに追加"} onClose={onClose}>
      <Field label="タイトル"><input value={title} onChange={e=>setTitle(e.target.value)} placeholder="いつかやりたいこと" style={inputSt()} autoFocus/></Field>
      <Field label="カテゴリ"><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{categories.map(cat=><Pill key={cat.id} label={cat.name} active={catId===cat.id} color={cat.color} bg={cat.bg} onClick={()=>setCatId(cat.id)}/>)}</div></Field>
      <div style={{marginBottom:16}}>
        <button onClick={()=>setPinned(p=>!p)} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 14px",borderRadius:10,fontSize:12,fontWeight:700,background:pinned?C.pinkDim:C.surface2,border:`1px solid ${pinned?C.pink:C.border}`,color:pinned?C.pink:C.textSub,cursor:"pointer"}}>
          <Icon name={pinned?"pinFill":"pin"} size={13} color={pinned?C.pink:C.textSub}/>{pinned?"ピン留め中":"ピン留めする"}
        </button>
      </div>
      <button onClick={()=>{if(title.trim())onSave({...initial,title:title.trim(),categoryId:catId,pinned});}} style={{width:"100%",padding:14,borderRadius:14,fontSize:15,fontWeight:700,background:`linear-gradient(135deg,${C.amber},${C.amber}bb)`,border:"none",color:C.dark?"#000":"#fff",cursor:"pointer"}}>{initial?"更新する":"追加する"}</button>
    </BottomSheet>
  );
}

const PRESET_COLORS=["#d0a727","#667572","#a1bad0","#5a7a9a","#8a6e3a","#b85c4a","#9aaba8","#c49020","#7a9e8a","#6a7f8c"];
function CategoryModal({initial,onClose,onSave,onDelete}){
  const [name,setName]=useState(initial?.name||"");
  const [color,setColor]=useState(initial?.color||PRESET_COLORS[0]);
  return(
    <BottomSheet title={initial?"カテゴリを編集":"カテゴリを追加"} onClose={onClose}>
      <Field label="名前"><input value={name} onChange={e=>setName(e.target.value)} placeholder="カテゴリ名" style={inputSt()} autoFocus/></Field>
      <Field label="カラー">
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{PRESET_COLORS.map(c=><button key={c} onClick={()=>setColor(c)} style={{width:32,height:32,borderRadius:"50%",background:c,border:`3px solid ${color===c?"#fff":"transparent"}`,cursor:"pointer",outline:"none"}}/>)}</div>
        <div style={{marginTop:8,display:"flex",alignItems:"center",gap:10}}><div style={{width:24,height:24,borderRadius:"50%",background:color}}/><span style={{fontSize:11,color:C.textSub}}>{name||"（名前なし）"}</span></div>
      </Field>
      <button onClick={()=>{if(name.trim())onSave({...initial,name:name.trim(),color,bg:color+"22"});}} style={{width:"100%",padding:14,borderRadius:14,fontSize:15,fontWeight:700,background:`linear-gradient(135deg,${color},${color}cc)`,border:"none",color:"#fff",cursor:"pointer",marginBottom:10}}>{initial?"更新する":"追加する"}</button>
      {initial&&<button onClick={()=>{if(window.confirm(`「${initial.name}」を削除しますか？`))onDelete(initial.id);}} style={{width:"100%",padding:11,borderRadius:14,fontSize:13,fontWeight:600,background:C.redDim,border:`1px solid ${C.red}44`,color:C.red,cursor:"pointer"}}>削除する</button>}
    </BottomSheet>
  );
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
